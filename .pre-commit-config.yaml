repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=1000']

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.12
    hooks:
      - id: uv-lock

  # ruff and codespell run through `uv run` so the hook uses the exact version
  # pinned in uv.lock (the same one CI runs), not a floating pre-commit mirror.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix --exit-non-zero-on-fix --force-exclude
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]

      - id: nbstripout
        name: strip notebook outputs
        entry: uv run nbstripout
        language: system
        types: [jupyter]

      - id: codespell
        name: Check spelling
        entry: uv run codespell
        language: system
        types_or: [markdown, python, text]
        # notebook JSON (base64 images, mpl internals) trips false positives
        exclude: '\.ipynb$'
